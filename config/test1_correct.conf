# ====================================================================
#  🏆 未央学姐的 WebServer 工业级极限黑盒测试用例 (test_complex.conf)
# ====================================================================

# http {
    # ----------------------------------------------------------------
    #  别墅 1：标准 Web 虚拟主机 (监听 80 端口，多域名复用测试)
    # ----------------------------------------------------------------
    server {
        listen       80;
        server_name  webserv.com www.webserv.com;
        root         /var/www/html;
        index        index.html index.htm;

        # 极端连续空格与制表符测试
        max_body_size       100M;

        # 房间 A：根路径
        location / {
            root      /var/www/html/welcome;
            index     welcome.html;
            allow_methods GET POST;
        }

        # 房间 B：API 路由 (带 proxy_pass 和特殊符号)
        location /api {
            allow_methods GET POST DELETE;
            cgi_extension .py /usr/bin/python3;
            max_body_size 10M;
        }

        # 房间 C：静态资源盲写，无内嵌指令测试 (空房间)
        location /static {
        }
    }

    # ----------------------------------------------------------------
    #  别墅 2：跨端口虚拟主机 (复用域名 webserv.com，但端口不同 -> 应该成功)
    # ----------------------------------------------------------------
    server {
        listen       8080;
        server_name  webserv.com; # 🚀 跨端口域名复用测试：在 8080 端口，这个域名不应该报 Duplicate
        root         /var/www/bonus;

        location / {
            allow_methods GET;
            autoindex on;
        }
    }

    # ----------------------------------------------------------------
    #  别墅 3：同端口多虚拟主机 (同 8080 端口，但域名不同 -> 应该成功)
    # ----------------------------------------------------------------
    server {
        listen       8080;
        server_name  api.webserv.com; # 🚀 同端口、非同域名测试：此时 8080 已有两个不同主机
        root         /var/www/api_v2;

        location /v2 {
            root /var/www/api_v2/sub;
        }
    }

    # ----------------------------------------------------------------
    #  别墅 4：空参数与极端边界测试
    # ----------------------------------------------------------------
    server {
        listen 9000;
        server_name empty_loc.com;
        root /tmp;

        # 🔒 严苛断句测试：分号前紧跟字符
        error_page 404 /404.html;

        # 🔒 极端格式测试：把 location 挤在同一行
        location /one_line { root /tmp/one; index index.html; }
    }
# }