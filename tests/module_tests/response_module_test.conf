server {
listen 18080;
server_name localhost;
root tests/tmp_response_www;
error_page 404 tests/tmp_response_www/custom404.html;
max_body_size 1M;
index missing-index.html index.html;
allow_methods GET POST DELETE;
upload_path /upload/;
autoindex off;
location /readonly/ { allow_methods GET; }
location /old/ { return 301 /new/; }
location /not-modified/ { return 304 /cached/; }
location /list/ { autoindex on; }
location /text-index/ { index readme.txt; }
location /joined/ { upload_path joined_upload; }
location /missing-upload/ { upload_path does-not-exist; }
location /alias/ { alias tests/tmp_response_www/alias_target/; allow_methods GET; }
location /cgi/ { allow_methods GET POST; cgi_extension .sh /bin/sh; }
}
