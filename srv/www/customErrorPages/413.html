<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8">
    <title>413 Payload Too Large</title>
    <style>
        html,
        body {
            height: 100%;
            margin: 0
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center
        }

        .card {
            max-width: 520px;
            padding: 24px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font: 16px/1.4 system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
            background: #fff;
            color: #111;
        }

        h1 {
            margin: 0 0 8px;
            font-size: 32px
        }

        p {
            margin: 8px 0
        }

        a {
            color: #0645AD;
            text-decoration: none
        }

        a:hover {
            text-decoration: underline
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>413 — Payload Too Large</h1>
        <p>The uploaded content is larger than this server allows.</p>
        <p><a href="/">Go back home</a></p>
    </div>
</body>

</html>
