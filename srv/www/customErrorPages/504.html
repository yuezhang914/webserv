<!-- 你们当前代码里 504 可能是 CGI 模块直接写死返回的，不一定会走 error_page 504。
 要让 504 使用这个页面，需要把 CGI timeout 那块也改成调用统一的 createResponse(504, "", error_pages)。 -->
<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8">
    <title>504 Gateway Timeout</title>
    <style>
        html,
        body {
            height: 100%;
            margin: 0
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center
        }

        .card {
            max-width: 520px;
            padding: 24px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font: 16px/1.4 system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
            background: #fff;
            color: #111;
        }

        h1 {
            margin: 0 0 8px;
            font-size: 32px
        }

        p {
            margin: 8px 0
        }

        a {
            color: #0645AD;
            text-decoration: none
        }

        a:hover {
            text-decoration: underline
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>504 — Gateway Timeout</h1>
        <p>The CGI program took too long to respond.</p>
        <p><a href="/">Go back home</a></p>
    </div>
</body>

</html>
